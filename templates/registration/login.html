{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-4">
    <div class="card shadow-sm">
      <div class="card-body">
        <h3 class="mb-3">Вхід до системи</h3>
        <form method="post">
          {% csrf_token %}
          {% if form.errors %}
            <div class="alert alert-danger">Невірний логін або пароль.</div>
          {% endif %}
          {{ form.as_p }}
          <button class="btn btn-primary w-100">Увійти</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
